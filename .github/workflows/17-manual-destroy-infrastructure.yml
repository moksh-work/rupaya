name: 17 - Manual Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to destroy
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirmation:
        description: Type exactly DESTROY-<ENV> (DESTROY-DEV, DESTROY-STAGING, DESTROY-PROD)
        required: true
        type: string
      role_arn_override:
        description: Optional explicit AWS role ARN to assume
        required: false
        type: string
      aws_region:
        description: AWS region for Terraform/backend resources
        required: true
        default: us-east-1
        type: string
      delete_state_backend:
        description: Also delete Terraform state bucket + lock table after destroy (true/false)
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: manual-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }} infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      CONFIRMATION: ${{ github.event.inputs.confirmation }}
      ROLE_ARN_INPUT: ${{ github.event.inputs.role_arn_override }}
      AWS_REGION_INPUT: ${{ github.event.inputs.aws_region }}
      DELETE_STATE_BACKEND: ${{ github.event.inputs.delete_state_backend }}
      ACCOUNT_ID_DEV: ${{ vars.AWS_ACCOUNT_ID_DEV }}
      ACCOUNT_ID_STAGING: ${{ vars.AWS_ACCOUNT_ID_STAGING }}
      ACCOUNT_ID_PROD: ${{ vars.AWS_ACCOUNT_ID_PROD }}
      ROLE_DEV_SECRET: ${{ secrets.AWS_OIDC_ROLE_ARN_DEV }}
      ROLE_STAGING_SECRET: ${{ secrets.AWS_OIDC_ROLE_ARN_STAGING }}
      ROLE_PROD_SECRET: ${{ secrets.AWS_OIDC_ROLE_ARN_PROD }}
      ROLE_DEV_VAR: ${{ vars.AWS_OIDC_ROLE_ARN_DEV }}
      ROLE_STAGING_VAR: ${{ vars.AWS_OIDC_ROLE_ARN_STAGING }}
      ROLE_PROD_VAR: ${{ vars.AWS_OIDC_ROLE_ARN_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate confirmation + resolve role/account
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          echo "proceed=false" >> "$GITHUB_OUTPUT"

          EXPECTED_CONFIRM="DESTROY-${ENVIRONMENT^^}"
          if [[ "$CONFIRMATION" != "$EXPECTED_CONFIRM" ]]; then
            echo "Confirmation guard blocked destroy. Expected: $EXPECTED_CONFIRM"
            echo "No infrastructure changes were made."
            exit 0
          fi

          ROLE_ARN=""
          EXPECTED_ACCOUNT_ID=""
          DEFAULT_ROLE_NAME=""

          case "$ENVIRONMENT" in
            dev)
              ROLE_ARN="$ROLE_DEV_SECRET"
              if [[ -z "$ROLE_ARN" ]]; then ROLE_ARN="$ROLE_DEV_VAR"; fi
              EXPECTED_ACCOUNT_ID="$ACCOUNT_ID_DEV"
              DEFAULT_ROLE_NAME="rupaya-github-oidc-dev"
              ;;
            staging)
              ROLE_ARN="$ROLE_STAGING_SECRET"
              if [[ -z "$ROLE_ARN" ]]; then ROLE_ARN="$ROLE_STAGING_VAR"; fi
              EXPECTED_ACCOUNT_ID="$ACCOUNT_ID_STAGING"
              DEFAULT_ROLE_NAME="rupaya-github-oidc-staging"
              ;;
            prod)
              ROLE_ARN="$ROLE_PROD_SECRET"
              if [[ -z "$ROLE_ARN" ]]; then ROLE_ARN="$ROLE_PROD_VAR"; fi
              EXPECTED_ACCOUNT_ID="$ACCOUNT_ID_PROD"
              DEFAULT_ROLE_NAME="rupaya-github-oidc-prod"
              ;;
            *)
              echo "Unsupported environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          if [[ -n "$ROLE_ARN_INPUT" ]]; then
            ROLE_ARN="$ROLE_ARN_INPUT"
          fi

          ROLE_ARN="$(echo "$ROLE_ARN" | tr -d '\r' | tr -d '\n' | xargs)"
          ROLE_ARN="${ROLE_ARN#\"}"
          ROLE_ARN="${ROLE_ARN%\"}"

          if [[ "$ROLE_ARN" == AWS_OIDC_ROLE_ARN_*=* ]]; then
            ROLE_ARN="${ROLE_ARN#*=}"
          fi

          if [[ "$ROLE_ARN" =~ (arn:aws[a-zA-Z-]*:iam::[0-9]{12}:role/[A-Za-z0-9+=,.@_/-]+) ]]; then
            ROLE_ARN="${BASH_REMATCH[1]}"
          fi

          if [[ "$ROLE_ARN" != arn:aws:iam::*:role/* && -n "$EXPECTED_ACCOUNT_ID" ]]; then
            ROLE_ARN="arn:aws:iam::${EXPECTED_ACCOUNT_ID}:role/${DEFAULT_ROLE_NAME}"
          fi

          if [[ "$ROLE_ARN" != arn:aws:iam::*:role/* ]]; then
            echo "Invalid role ARN format: $ROLE_ARN"
            echo "Set AWS_OIDC_ROLE_ARN_${ENVIRONMENT^^} secret/var or provide role_arn_override"
            exit 1
          fi

          ROLE_ACCOUNT_ID=$(echo "$ROLE_ARN" | sed -E 's#^arn:aws:iam::([0-9]{12}):role/.+#\1#')
          if [[ ! "$ROLE_ACCOUNT_ID" =~ ^[0-9]{12}$ ]]; then
            echo "Could not parse account id from role ARN: $ROLE_ARN"
            exit 1
          fi

          if [[ -n "$EXPECTED_ACCOUNT_ID" && "$ROLE_ACCOUNT_ID" != "$EXPECTED_ACCOUNT_ID" ]]; then
            echo "Role account id ($ROLE_ACCOUNT_ID) does not match configured account id ($EXPECTED_ACCOUNT_ID) for $ENVIRONMENT"
            echo "Update AWS_OIDC_ROLE_ARN_${ENVIRONMENT^^} / AWS_ACCOUNT_ID_${ENVIRONMENT^^} or use matching role_arn_override"
            exit 1
          fi

          echo "Resolved role ARN: $ROLE_ARN"
          echo "Resolved account id: $ROLE_ACCOUNT_ID"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "account_id=$ROLE_ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "aws_region=$AWS_REGION_INPUT" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: ${{ steps.resolve.outputs.proceed == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.resolve.outputs.role_arn }}
          aws-region: ${{ steps.resolve.outputs.aws_region }}

      - name: Setup Terraform
        if: ${{ steps.resolve.outputs.proceed == 'true' }}
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform destroy
        if: ${{ steps.resolve.outputs.proceed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          cd "infra/aws/environments/${ENVIRONMENT}"

          ACCOUNT_ID="${{ steps.resolve.outputs.account_id }}"
          AWS_REGION="${{ steps.resolve.outputs.aws_region }}"
          TFSTATE_BUCKET="rupaya-terraform-state-${ACCOUNT_ID}"
          TFSTATE_DDB_TABLE="rupaya-terraform-lock-${ACCOUNT_ID}"

          echo "Using backend bucket: $TFSTATE_BUCKET"
          echo "Using backend lock table: $TFSTATE_DDB_TABLE"

          if ! aws s3api head-bucket --bucket "$TFSTATE_BUCKET" >/dev/null 2>&1; then
            if [[ "$AWS_REGION" == "us-east-1" ]]; then
              aws s3api create-bucket --bucket "$TFSTATE_BUCKET" --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$TFSTATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          if ! aws dynamodb describe-table --table-name "$TFSTATE_DDB_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$TFSTATE_DDB_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TFSTATE_DDB_TABLE" --region "$AWS_REGION"
          fi

          terraform init -upgrade \
            -backend-config="bucket=${TFSTATE_BUCKET}" \
            -backend-config="key=environments/${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TFSTATE_DDB_TABLE}" \
            -backend-config="encrypt=true"

          terraform validate
          terraform plan -destroy -out tfdestroy
          terraform apply -auto-approve tfdestroy

      - name: Optional cleanup Terraform backend
        if: ${{ steps.resolve.outputs.proceed == 'true' && github.event.inputs.delete_state_backend == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="${{ steps.resolve.outputs.account_id }}"
          AWS_REGION="${{ steps.resolve.outputs.aws_region }}"
          TFSTATE_BUCKET="rupaya-terraform-state-${ACCOUNT_ID}"
          TFSTATE_DDB_TABLE="rupaya-terraform-lock-${ACCOUNT_ID}"

          echo "Cleaning backend bucket and table for account: $ACCOUNT_ID"

          if aws s3api head-bucket --bucket "$TFSTATE_BUCKET" >/dev/null 2>&1; then
            if command -v jq >/dev/null 2>&1; then
              while true; do
                VERSIONS_JSON=$(aws s3api list-object-versions --bucket "$TFSTATE_BUCKET" --output json)
                VERSION_COUNT=$(echo "$VERSIONS_JSON" | jq '[.Versions[]?] | length')
                MARKER_COUNT=$(echo "$VERSIONS_JSON" | jq '[.DeleteMarkers[]?] | length')

                if [[ "$VERSION_COUNT" == "0" && "$MARKER_COUNT" == "0" ]]; then
                  break
                fi

                DELETE_PAYLOAD=$(echo "$VERSIONS_JSON" | jq '{Objects: ([.Versions[]? | {Key, VersionId}] + [.DeleteMarkers[]? | {Key, VersionId}]), Quiet: true}')
                echo "$DELETE_PAYLOAD" > /tmp/s3-delete-payload.json
                aws s3api delete-objects --bucket "$TFSTATE_BUCKET" --delete file:///tmp/s3-delete-payload.json >/dev/null
              done
            else
              aws s3 rm "s3://${TFSTATE_BUCKET}" --recursive || true
            fi

            aws s3api delete-bucket --bucket "$TFSTATE_BUCKET" --region "$AWS_REGION"
            echo "Deleted bucket: $TFSTATE_BUCKET"
          else
            echo "Backend bucket not found: $TFSTATE_BUCKET"
          fi

          if aws dynamodb describe-table --table-name "$TFSTATE_DDB_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb delete-table --table-name "$TFSTATE_DDB_TABLE" --region "$AWS_REGION"
            aws dynamodb wait table-not-exists --table-name "$TFSTATE_DDB_TABLE" --region "$AWS_REGION"
            echo "Deleted lock table: $TFSTATE_DDB_TABLE"
          else
            echo "Lock table not found: $TFSTATE_DDB_TABLE"
          fi

      - name: Summary
        if: always()
        run: |
          if [[ "${{ steps.resolve.outputs.proceed }}" != "true" ]]; then
            echo "⚠️ Destroy workflow skipped by confirmation guard"
            echo "Expected confirmation: DESTROY-${ENVIRONMENT^^}"
            echo "Provided confirmation: $CONFIRMATION"
            exit 0
          fi

          echo "✅ Destroy workflow completed"
          echo "Environment: $ENVIRONMENT"
          echo "AWS account: ${{ steps.resolve.outputs.account_id }}"
          echo "Region: ${{ steps.resolve.outputs.aws_region }}"
          echo "delete_state_backend: $DELETE_STATE_BACKEND"
